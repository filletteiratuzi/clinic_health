<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rural Care</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
  >

  <style>

    body{
      background:#f4f7fb;
      font-family:Arial;
    }

    .sidebar{
      width:240px;
      height:100vh;
      background:#0d6efd;
      position:fixed;
      padding-top:20px;
    }

    .sidebar h2{
      color:white;
      text-align:center;
      margin-bottom:30px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:14px;
      margin:10px;
      border-radius:10px;
      font-size:17px;
    }

    .sidebar a:hover{
      background:white;
      color:#0d6efd;
    }

    .content{
      margin-left:260px;
      padding:30px;
    }

    .card{
      border-radius:15px;
    }

    .btn{
      border-radius:10px;
    }

    table{
      background:white;
    }

    input:focus,
    button:focus,
    a:focus{
      outline:3px solid yellow;
    }

  </style>

</head>

<body>

  <div class="sidebar">

    <h2>
      <i class="bi bi-hospital"></i>
      Rural Care
    </h2>

    <a href="index.html">
      <i class="bi bi-house"></i>
      Rural Care
    </a>

    <a href="register.html">
      <i class="bi bi-person-plus"></i>
      Register Patient
    </a>

    <a href="patient.html">
      <i class="bi bi-people"></i>
      Patient
    </a>

    <a href="appointment.html">
      <i class="bi bi-calendar-check"></i>
      Appointment
    </a>

    <a href="report.html">
      <i class="bi bi-file-earmark"></i>
      Report
    </a>

  </div>

  <div class="content">

    <h1 class="text-center text-primary mb-4">
      Digital Patient Check-in
    </h1>

    <div class="card p-4 shadow">

      <div class="mb-3">
        <label class="form-label">
          Patient Name
        </label>

        <input
          type="text"
          class="form-control"
          placeholder="Enter patient name"
        >
      </div>

      <div class="mb-3">
        <label class="form-label">
          National ID
        </label>

        <input
          type="text"
          class="form-control"
          placeholder="Enter National ID"
        >
      </div>

      <div class="mb-3">

        <label class="form-label">
          Symptoms
        </label>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            Fever
          </label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            Cough
          </label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            Headache
          </label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">
            Stomach Pain
          </label>
        </div>

      </div>

      <div class="d-flex gap-3">

        <button class="btn btn-primary w-50">
          Check In
        </button>

        <button class="btn btn-danger w-50">
          Cancel
        </button>

      </div>

    </div>

    <div class="alert alert-success mt-4 text-center">
      Your Queue Number :
      <strong>1</strong>
    </div>

    <div class="mt-5">

      <h3>
        Patient Queue
      </h3>

      <table class="table table-bordered table-striped">

        <thead class="table-dark">

          <tr>
            <th>Queue</th>
            <th>Name</th>
            <th>National ID</th>
            <th>Symptoms</th>
          </tr>

        </thead>

        <tbody>

          <tr>
            <td>1</td>
            <td>Fillette Iratuzi</td>
            <td>1199887766554433</td>
            <td>Fever, Headache</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</body>
</html>
