<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Digital Patient Check-in</title>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    body{
      background:#f4f7fb;
      font-family:Arial;
    }

    .sidebar{
      width:230px;
      height:100vh;
      background:#0d6efd;
      position:fixed;
      padding:20px;
    }

    .sidebar h2{
      color:white;
      text-align:center;
      margin-bottom:30px;
    }

    .sidebar button{
      width:100%;
      margin-bottom:15px;
      border:none;
      border-radius:10px;
      padding:10px;
      background:white;
    }

    .sidebar button:hover{
      background:#dbe8ff;
    }

    .sidebar a{
      text-decoration:none;
      color:#0d6efd;
      font-weight:bold;
      display:block;
    }

    .content{
      margin-left:260px;
      padding:30px;
    }

    .card{
      border-radius:15px;
    }

  </style>

</head>

<body>

<div id="app">

  <div class="sidebar">

    <h2>
      Rural Care
    </h2>

    <button>
      <a href="w.html">
        Rural Care
      </a>
    </button>

    <button>
      <a href="ww1.html">
        Register Patient
      </a>
    </button>

    <button>
      <a href="zz.html">
        Patient
      </a>
    </button>

  </div>

  <div class="content">

    <h1 class="text-center text-primary mb-4">
      Digital Patient Check-in
    </h1>

    <div
      class="card p-4 shadow"
      v-if="!isRegistered"
    >

      <div class="mb-3">

        <label class="form-label">
          Patient Name
        </label>

        <input
          type="text"
          class="form-control"
          v-model="name"
          placeholder="Enter patient name"
        >

      </div>

      <div class="mb-3">

        <label class="form-label">
          National ID
        </label>

        <input
          type="text"
          class="form-control"
          v-model="nationalID"
          placeholder="Enter National ID"
        >

      </div>

      <div class="mb-3">

        <label class="form-label">
          Symptoms
        </label>

        <div class="form-check">

          <input
            type="checkbox"
            value="Fever"
            class="form-check-input"
            v-model="symptoms"
          >

          <label class="form-check-label">
            Fever
          </label>

        </div>

        <div class="form-check">

          <input
            type="checkbox"
            value="Cough"
            class="form-check-input"
            v-model="symptoms"
          >

          <label class="form-check-label">
            Cough
          </label>

        </div>

        <div class="form-check">

          <input
            type="checkbox"
            value="Headache"
            class="form-check-input"
            v-model="symptoms"
          >

          <label class="form-check-label">
            Headache
          </label>

        </div>

        <div class="form-check">

          <input
            type="checkbox"
            value="Stomach Pain"
            class="form-check-input"
            v-model="symptoms"
          >

          <label class="form-check-label">
            Stomach Pain
          </label>

        </div>

      </div>

      <div class="d-flex gap-3">

        <button
          class="btn btn-primary w-50"
          @click="submitCheckIn"
        >
          Check In
        </button>

        <button
          class="btn btn-danger w-50"
          @click="cancelRegistration"
        >
          Cancel
        </button>

      </div>

    </div>

    <div
      class="alert alert-success mt-4"
      v-if="isRegistered"
    >

      Registration Success

      <br>

      Your Queue Number :
      <strong>
        {{ queueNumber - 1 }}
      </strong>

    </div>

    <div class="mt-5">

      <h3>
        Patient Queue
      </h3>

      <table class="table table-bordered table-striped">

        <thead class="table-dark">

          <tr>
            <th>Queue</th>
            <th>Name</th>
            <th>National ID</th>
            <th>Symptoms</th>
          </tr>

        </thead>

        <tbody>

          <tr
            v-for="patient in patients"
          >

            <td>
              {{ patient.queue }}
            </td>

            <td>
              {{ patient.name }}
            </td>

            <td>
              {{ patient.nationalID }}
            </td>

            <td>
              {{ patient.symptoms.join(', ') }}
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

<script>

Vue.createApp({

  data(){

    return{

      name:"",
      nationalID:"",
      symptoms:[],

      queueNumber:1,
      isRegistered:false,

      patients:[]

    }

  },

  methods:{

    submitCheckIn(){

      if(this.nationalID == ""){

        alert("National ID Required")

      }

      else if(this.nationalID.length < 16){

        alert("National ID must have 16 digits")

      }

      else{

        this.patients.push({

          queue:this.queueNumber,
          name:this.name,
          nationalID:this.nationalID,
          symptoms:this.symptoms

        })

        this.isRegistered = true

        this.queueNumber++

      }

    },

    cancelRegistration(){

      this.name = ""
      this.nationalID = ""
      this.symptoms = []

      alert("Registration Cancelled")

    }

  },

  mounted(){

    console.log("Clinic System Started")

  }

}).mount("#app")

</script>

</body>
</html>
