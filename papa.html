<!DOCTYPE html>
<html>
<head>
  <title>Add Appointment</title>
</head>

<body style="background:linear-gradient(to right,#caf0f8,#90e0ef); font-family:Arial;">

  <div style="max-width:400px; margin:50px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 3px 10px gray;">

    <h2 style="text-align:center; color:#0077b6;">New Appointment</h2>

    <input type="text" placeholder="Patient Name"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px;"><br>

    <input type="date"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px;"><br>

    <input type="time"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px;"><br>

    <input type="text" placeholder="Doctor Name"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px;"><br>

    <button style="width:100%; padding:10px; background:#0077b6; color:white; border:none; border-radius:8px;">
      Save Appointment
    </button>

    <div style="text-align:center; margin-top:10px;">
      <a href="appointments.html" style="text-decoration:none; color:#023e8a;">
        ← Back
      </a>
    </div>

  </div>

</body>
</html>
